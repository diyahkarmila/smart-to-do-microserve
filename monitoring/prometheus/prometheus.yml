global:
  scrape_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: host
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: containers
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: todo-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth-service:3000
          - task-service:3000
          - category-service:3000
          - notification-service:3000
          - realtime-service:3000
          - analytics-service:3000
